<!DOCTYPE html>
<html>
<head>
<title>Exclusive Fans</title>
<style>

body{

font-family:Arial;

background:#0f172a;

color:white;

text-align:center;

margin:0;

}

header{

background:#111827;

padding:20px;

font-size:28px;

font-weight:bold;

}

.container{

margin-top:60px;

}

.profile{

width:150px;

border-radius:50%;

}

.fans{

margin:20px;

font-size:22px;

color:#22c55e;

}

button{

background:#00aff0;

border:none;

padding:15px 35px;

font-size:18px;

border-radius:8px;

cursor:pointer;

color:white;

}

button:hover{

background:#0284c7;

}

.loading{

display:none;

font-size:24px;

margin-top:30px;

}

.prank{

display:none;

font-size:30px;

color:#f87171;

margin-top:30px;

}
</style>
</head>
<body>
<header>

ONLYFANS PREMIUM
</header>
<div class="container">
<img class="profile" src="https://i.imgur.com/8Km9tLL.png">
<h2>Exclusive Creator</h2>
<div class="fans">

🔥 Fans: <span id="fanCount">12483</span>
</div>
<button onclick="subscribe()">Subscribe $9.99</button>
<div class="loading" id="loading">

Processing Payment...
</div>
<div class="prank" id="prank">

😂 GOT YOU! PRANK WEBSITE!
</div>
</div>
<script>

let fans = 12483;

setInterval(()=>{

fans += Math.floor(Math.random()*3);

document.getElementById("fanCount").innerText = fans;

},1500);


function subscribe(){

document.getElementById("loading").style.display="block";

setTimeout(()=>{

document.getElementById("loading").innerText="Charging your bank account...";

},2000);

setTimeout(()=>{

document.getElementById("loading").style.display="none";

document.getElementById("prank").style.display="block";

},4000);

}
</script>
</body>
</html>
